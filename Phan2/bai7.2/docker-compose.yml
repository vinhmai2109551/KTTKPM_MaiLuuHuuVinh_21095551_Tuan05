services:
  mongodb:
    image: mongo:latest
    environment:
      # Thiết lập tài khoản quản trị tối cao (Root)
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "27017:27017"         # Cổng mặc định của MongoDB

  mongo-express:
    image: mongo-express:latest
    depends_on:
      - mongodb               # Chờ MongoDB chạy trước
    ports:
      - "8082:8081"           # Truy cập giao diện quản lý tại cổng 8082
    environment:
      # Kết nối tới MongoDB bằng tên service 'mongodb'
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/