version: '3.8'

services:
  # 1. Dịch vụ MySQL 5.7
  db_wp:
    image: mysql:5.7
    container_name: mysql_wordpress_vinh
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: wordpress_db
      MYSQL_USER: wp_user
      MYSQL_PASSWORD: wp_password
    volumes:
      - ./db_data:/var/lib/mysql
    networks:
      - wp_network

  # 2. Dịch vụ WordPress
  wordpress:
    image: wordpress:latest
    container_name: wp_site_vinh
    restart: always
    depends_on:
      - db_wp
    ports:
      - "8085:80"
    environment:
      WORDPRESS_DB_HOST: db_wp:3306
      WORDPRESS_DB_USER: wp_user
      WORDPRESS_DB_PASSWORD: wp_password
      WORDPRESS_DB_NAME: wordpress_db
    networks:
      - wp_network

networks:
  wp_network:
    driver: bridge